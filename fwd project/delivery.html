<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delivery & Payment | YOUR HEALTH OUR PRIORITY</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-requires-user-auth="true">
  <header class="topbar" aria-label="Main Navigation">
    <div class="topbar-inner">
      <div class="brand">YOUR HEALTH OUR PRIORITY</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="medicine.html">Medicine Info</a>
        <a href="features.html">Senior Features</a>
        <a href="tips.html">Health Tips</a>
        <a href="contact.html">Contact</a>
        <a class="active" href="delivery.html">Delivery</a>
        <a href="signup.html">Sign Up</a>
        <a href="login.html">Login</a>
        <a href="admin-login.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="panel">
      <h1><span class="icon">??</span>Medicine Delivery & Payment</h1>
      <p>Place your medicine order. Admin can manage your order status securely.</p>
      <form id="orderForm" class="form-grid">
        <label>
          Full Name
          <input class="input" id="customerName" type="text" required placeholder="Enter full name" />
        </label>
        <label>
          Phone Number
          <input class="input" id="customerPhone" type="tel" required placeholder="Enter phone number" />
        </label>
        <label>
          Medicine Name
          <input class="input" id="orderMedicine" type="text" required placeholder="Example: Metformin" />
        </label>
        <label>
          Quantity
          <input class="input" id="orderQty" type="number" min="1" value="1" required />
        </label>
        <label>
          Total Amount
          <input class="input" id="orderTotalAmount" type="text" readonly />
        </label>
        <label class="full">
          Delivery Address
          <input class="input" id="orderAddress" type="text" required placeholder="House no, street, city, pincode" />
        </label>

        <div class="full">
          <strong>Choose Payment Method</strong>
          <div class="radio-group" role="radiogroup" aria-label="Payment method">
            <label><input type="radio" name="payment" value="Cash on Delivery" checked /> Cash on Delivery</label>
            <label><input type="radio" name="payment" value="UPI" /> UPI (@upi)</label>
            <label><input type="radio" name="payment" value="Card" /> Card</label>
          </div>
        </div>

        <div class="full payment-details" id="upiDetails" hidden>
          <label>
            UPI ID
            <input class="input" id="upiId" type="text" placeholder="example@upi" />
          </label>
        </div>

        <div class="full payment-details" id="cardDetails" hidden>
          <label>
            Card Holder Name
            <input class="input" id="cardName" type="text" placeholder="Name on card" />
          </label>
          <label>
            Card Number
            <input class="input" id="cardNumber" type="text" inputmode="numeric" maxlength="19" placeholder="1234 5678 9012 3456" />
          </label>
          <label>
            Expiry (MM/YY)
            <input class="input" id="cardExpiry" type="text" maxlength="5" placeholder="MM/YY" />
          </label>
          <label>
            CVV
            <input class="input" id="cardCvv" type="password" inputmode="numeric" maxlength="4" placeholder="123" />
          </label>
        </div>

        <button class="btn" type="submit">Place Delivery Order</button>
      </form>
      <div id="orderStatus" class="status" aria-live="polite"></div>
    </section>

    <p class="footer-note">Safe delivery with simple payment you can trust.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
