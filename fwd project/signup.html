<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | YOUR HEALTH OUR PRIORITY</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar" aria-label="Main Navigation">
    <div class="topbar-inner">
      <div class="brand">YOUR HEALTH OUR PRIORITY</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="delivery.html">Delivery</a>
        <a class="active" href="signup.html">Sign Up</a>
        <a href="login.html">Login</a>
        <a href="admin-login.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="panel auth-panel">
      <h1>Create Account</h1>
      <p>Sign up to place medicine orders faster.</p>
      <form id="signupForm" class="form-grid">
        <label>
          Full Name
          <input id="signupName" class="input" type="text" required />
        </label>
        <label>
          Email
          <input id="signupEmail" class="input" type="email" required />
        </label>
        <label>
          Phone
          <input id="signupPhone" class="input" type="tel" />
        </label>
        <label>
          Password
          <input id="signupPassword" class="input" type="password" required />
        </label>
        <button class="btn" type="submit">Create Account</button>
      </form>
      <div id="signupStatus" class="status" aria-live="polite"></div>
      <p class="small">Already have an account? <a href="login.html">Login here</a>.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
