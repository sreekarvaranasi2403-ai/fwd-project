<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | YOUR HEALTH OUR PRIORITY</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar" aria-label="Main Navigation">
    <div class="topbar-inner">
      <div class="brand">YOUR HEALTH OUR PRIORITY</div>
      <nav>
        <a href="index.html">Back to Site</a>
        <a class="active" href="admin-login.html">Admin Login</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="panel auth-panel">
      <h1>Admin Login</h1>
      <p>Use demo credentials to view and manage medicine orders.</p>
      <form id="adminLoginForm" class="form-grid">
        <label>
          Username
          <input id="adminUsername" class="input" type="text" required />
        </label>
        <label>
          Password
          <input id="adminPassword" class="input" type="password" required />
        </label>
        <button class="btn" type="submit">Login as Admin</button>
      </form>
      <div id="adminLoginStatus" class="status" aria-live="polite"></div>
      <p class="small">Demo: username `admin` and password `admin123`</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
